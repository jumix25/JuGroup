<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kundenportal - JuGroup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <a class="brand" href="index.html">
    <img src="logo.png" alt="JuGroup Logo" class="logo-image">
    <span>JuGroup</span>
  </a>
</header>

<div class="section contact">
<h1>Kundenportal</h1>

<p>
Konto Beta ist jetzt mit Firebase Login verbunden.
</p>

<div class="portal-auth" id="auth-panel">
  <h2>Einloggen</h2>

  <form class="portal-form" id="login-form">
    <label>
      E-Mail
      <input id="login-email" name="email" type="email" required>
    </label>

    <label>
      Passwort
      <input id="login-password" name="password" type="password" required>
    </label>

    <button class="button primary" type="submit">Einloggen</button>
  </form>

  <h2>Passwort zurücksetzen</h2>

  <form class="portal-form" id="reset-password-form">
    <label>
      E-Mail
      <input id="reset-password-email" name="reset-password-email" type="email" required>
    </label>

    <button class="button secondary" type="submit">Reset-Link senden</button>
  </form>

  <h2>Registrieren</h2>

  <form class="portal-form" id="signup-form">
    <label>
      E-Mail
      <input id="signup-email" name="email" type="email" required>
    </label>

    <label>
      Passwort
      <input id="signup-password" name="password" type="password" minlength="6" required>
    </label>

    <label>
      Passwort bestätigen
      <input id="signup-password-confirm" name="password-confirm" type="password" minlength="6" required>
    </label>

    <button class="button secondary" type="submit">Registrieren</button>
  </form>

  <p id="auth-message"></p>
</div>

<div class="portal-content" id="portal-content" hidden>
<p id="user-status"></p>
<p id="portal-message"></p>

<div class="portal-password" id="password-panel" hidden>
  <h2>Neues Passwort setzen</h2>

  <form class="portal-form" id="password-form">
    <label>
      Neues Passwort
      <input id="new-password" name="new-password" type="password" minlength="6" required>
    </label>

    <label>
      Neues Passwort bestätigen
      <input id="new-password-confirm" name="new-password-confirm" type="password" minlength="6" required>
    </label>

    <button class="button primary" type="submit">Passwort speichern</button>
  </form>
</div>

<button class="button secondary" id="logout-button" type="button">Ausloggen</button>

<div class="portal-admin" id="admin-panel" hidden>
  <h2>Adminbereich</h2>

  <form class="portal-form" id="admin-order-form">
    <label>
      Kundennummer
      <input id="admin-customer-number" name="customer-number" type="text" required>
    </label>

    <label>
      Laufender Auftrag
      <textarea id="admin-order-text" name="order-text" required></textarea>
    </label>

    <label>
      Status
      <select id="admin-order-status" name="order-status">
        <option value="Laufend">Laufend</option>
        <option value="Wartet">Wartet</option>
        <option value="Fertig">Fertig</option>
      </select>
    </label>

    <button class="button primary" type="submit">Auftrag hinzufügen</button>
  </form>

  <h2>Auftrag bearbeiten</h2>

  <form class="portal-form" id="admin-edit-order-form">
    <label>
      Auftragsnummer
      <input id="admin-edit-order-number" name="edit-order-number" type="text" inputmode="numeric" pattern="[0-9]{1,4}" maxlength="4" required>
    </label>

    <label>
      Status
      <select id="admin-edit-order-status" name="edit-order-status">
        <option value="Laufend">Laufend</option>
        <option value="Wartet">Wartet</option>
        <option value="Fertig">Fertig</option>
      </select>
    </label>

    <button class="button secondary" type="submit">Auftrag speichern</button>
  </form>
</div>

<div class="portal-database">
  <h2>Aufträge</h2>
  <div id="order-list"></div>
</div>

<div class="portal-admin-code" id="admin-code-panel">
  <h2>Admin-Zugriff</h2>

  <form class="portal-form" id="admin-code-form">
    <label>
      Admin-Code
      <input id="admin-code-input" name="admin-code" type="password" required>
    </label>

    <button class="button secondary" type="submit">Admin aktivieren</button>
  </form>
</div>
</div>

<a class="button primary"
   href="https://mail.google.com/mail/?view=cm&fs=1&to=jumix6544@gmail.com"
   target="_blank">
   Kontaktieren
</a>

<p><a href="index.html">Zurück zur Startseite</a></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-analytics.js";
import {
  createUserWithEmailAndPassword,
  getAuth,
  onAuthStateChanged,
  sendPasswordResetEmail,
  signInWithEmailAndPassword,
  signOut,
  updatePassword
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import {
  collection,
  doc,
  getDoc,
  getDocs,
  getFirestore,
  query,
  serverTimestamp,
  setDoc,
  updateDoc,
  where
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrb99DJuHo5noNQ7AnnUdugjR9YpWEGfU",
  authDomain: "jugroup-kundenportal.firebaseapp.com",
  projectId: "jugroup-kundenportal",
  storageBucket: "jugroup-kundenportal.firebasestorage.app",
  messagingSenderId: "39867975617",
  appId: "1:39867975617:web:25069754a41136e59a1140",
  measurementId: "G-NKRXBTW2LS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

if (firebaseConfig.measurementId) {
  getAnalytics(app);
}

const adminEmails = ["jumix6544@gmail.com"];
const adminAccessCode = "JUGROUP-ADMIN-2026";

const authPanel = document.getElementById("auth-panel");
const loginForm = document.getElementById("login-form");
const loginEmail = document.getElementById("login-email");
const loginPassword = document.getElementById("login-password");
const resetPasswordForm = document.getElementById("reset-password-form");
const resetPasswordEmail = document.getElementById("reset-password-email");
const signupForm = document.getElementById("signup-form");
const signupEmail = document.getElementById("signup-email");
const signupPassword = document.getElementById("signup-password");
const signupPasswordConfirm = document.getElementById("signup-password-confirm");
const authMessage = document.getElementById("auth-message");
const portalContent = document.getElementById("portal-content");
const userStatus = document.getElementById("user-status");
const portalMessage = document.getElementById("portal-message");
const passwordPanel = document.getElementById("password-panel");
const passwordForm = document.getElementById("password-form");
const newPassword = document.getElementById("new-password");
const newPasswordConfirm = document.getElementById("new-password-confirm");
const logoutButton = document.getElementById("logout-button");
const adminPanel = document.getElementById("admin-panel");
const adminOrderForm = document.getElementById("admin-order-form");
const adminCustomerNumber = document.getElementById("admin-customer-number");
const adminOrderText = document.getElementById("admin-order-text");
const adminOrderStatus = document.getElementById("admin-order-status");
const adminEditOrderForm = document.getElementById("admin-edit-order-form");
const adminEditOrderNumber = document.getElementById("admin-edit-order-number");
const adminEditOrderStatus = document.getElementById("admin-edit-order-status");
const adminCodePanel = document.getElementById("admin-code-panel");
const adminCodeForm = document.getElementById("admin-code-form");
const adminCodeInput = document.getElementById("admin-code-input");
const orderList = document.getElementById("order-list");
let activeUser = null;
let activeUserIsAdmin = false;
let activeUserCustomerNumber = "";

function setMessage(message) {
  authMessage.textContent = message;
  portalMessage.textContent = message;
}

function appendField(entry, label, value) {
  const line = document.createElement("span");
  line.textContent = `${label}: ${value}`;
  entry.append(line);
}

async function generateUniqueCustomerNumber() {
  for (let attempt = 0; attempt < 25; attempt += 1) {
    const candidate = String(Math.floor(100000 + Math.random() * 900000));
    const numberDoc = doc(db, "customer_numbers", candidate);
    const snapshot = await getDoc(numberDoc);

    if (!snapshot.exists()) {
      await setDoc(numberDoc, {
        createdAt: serverTimestamp()
      });
      return candidate;
    }
  }

  throw new Error("Keine freie Kundennummer gefunden.");
}

async function generateUniqueOrderNumber() {
  for (let attempt = 0; attempt < 9999; attempt += 1) {
    const candidate = String(Math.floor(1 + Math.random() * 9999)).padStart(4, "0");
    const numberDoc = doc(db, "order_numbers", candidate);
    const snapshot = await getDoc(numberDoc);

    if (!snapshot.exists()) {
      await setDoc(numberDoc, {
        createdAt: serverTimestamp()
      });
      return candidate;
    }
  }

  throw new Error("Keine freie Auftragsnummer gefunden.");
}

async function ensureCustomerProfile() {
  const profileRef = doc(db, "customer_profiles", activeUser.uid);
  const profile = await getDoc(profileRef);

  if (profile.exists() && profile.data().customerNumber) {
    activeUserCustomerNumber = profile.data().customerNumber;
    return;
  }

  const customerNumber = await generateUniqueCustomerNumber();
  await setDoc(profileRef, {
    email: activeUser.email.toLowerCase(),
    customerNumber,
    createdAt: serverTimestamp()
  });
  activeUserCustomerNumber = customerNumber;
}

async function customerNumberExists(customerNumber) {
  const profilesQuery = query(
    collection(db, "customer_profiles"),
    where("customerNumber", "==", customerNumber)
  );
  const snapshot = await getDocs(profilesQuery);
  return !snapshot.empty;
}

function renderOrders(orders) {
  orderList.innerHTML = "";

  if (orders.length === 0) {
    orderList.innerHTML = "<p>Noch keine Aufträge gespeichert.</p>";
    return;
  }

  orders.forEach((order) => {
    const entry = document.createElement("div");
    const title = document.createElement("strong");
    const orderText = order.orderText || order.order_text || "Auftrag";
    const orderNumber = order.orderNumber || order.order_number || order.id || "----";
    const customerNumber = order.customerNumber || order.customer_number || order.kundennummer || "Nicht eingetragen";
    const status = order.status || "Laufend";
    const customerEmail = order.customerEmail || order.customer_email || "";

    entry.className = "portal-entry";
    title.textContent = orderText;
    entry.append(title);
    appendField(entry, "Auftragsnummer", orderNumber);
    appendField(entry, "Kundennummer", customerNumber);
    appendField(entry, "Status", status);

    if (activeUserIsAdmin && customerEmail) {
      appendField(entry, "Kunden-E-Mail", customerEmail);
    }

    orderList.append(entry);
  });
}

async function checkAdmin() {
  const isMainAdmin = adminEmails.includes(activeUser.email.toLowerCase());
  let isPromotedAdmin = false;

  if (!isMainAdmin) {
    try {
      const adminDoc = await getDoc(doc(db, "admin_users", activeUser.uid));
      isPromotedAdmin = adminDoc.exists();
    } catch (_error) {
      isPromotedAdmin = false;
    }
  }

  activeUserIsAdmin = isMainAdmin || isPromotedAdmin;
  adminPanel.hidden = !activeUserIsAdmin;
  adminCodePanel.hidden = activeUserIsAdmin;
}

async function loadOrders() {
  try {
    const ordersQuery = activeUserIsAdmin
      ? query(collection(db, "customer_orders"))
      : query(
          collection(db, "customer_orders"),
          where("customerNumber", "==", activeUserCustomerNumber)
        );
    const snapshot = await getDocs(ordersQuery);
    const orders = snapshot.docs.map((doc) => ({
      id: doc.id,
      ...doc.data()
    })).sort((first, second) => {
      const firstTime = first.createdAt?.toMillis?.() || 0;
      const secondTime = second.createdAt?.toMillis?.() || 0;
      return secondTime - firstTime;
    });

    renderOrders(orders);
  } catch (error) {
    orderList.innerHTML = "";
    const message = document.createElement("p");
    message.textContent = error.message;
    orderList.append(message);
  }
}

loginForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  try {
    await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
  } catch (error) {
    setMessage(error.message);
  }
});

resetPasswordForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  try {
    await sendPasswordResetEmail(auth, resetPasswordEmail.value, {
      url: "https://jumix25.github.io/JuGroup/kundenportal.html"
    });
  } catch (error) {
    setMessage(error.message);
    return;
  }

  setMessage("Passwort-Link wurde gesendet. Bitte prüfe deine E-Mail.");
});

signupForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  if (signupPassword.value !== signupPasswordConfirm.value) {
    setMessage("Die Passwörter stimmen nicht überein.");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, signupEmail.value, signupPassword.value);
  } catch (error) {
    setMessage(error.message);
    return;
  }

  signupForm.reset();
  setMessage("Registrierung erstellt. Du bist jetzt eingeloggt.");
});

logoutButton.addEventListener("click", async () => {
  await signOut(auth);
});

passwordForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  if (newPassword.value !== newPasswordConfirm.value) {
    setMessage("Die neuen Passwörter stimmen nicht überein.");
    return;
  }

  try {
    await updatePassword(activeUser, newPassword.value);
  } catch (error) {
    setMessage(error.message);
    return;
  }

  passwordForm.reset();
  passwordPanel.hidden = true;
  setMessage("Passwort wurde gespeichert.");
});

adminOrderForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  try {
    const customerNumber = adminCustomerNumber.value.trim();
    const orderNumber = await generateUniqueOrderNumber();
    const knownCustomer = await customerNumberExists(customerNumber);

    if (!knownCustomer) {
      setMessage("Diese Kundennummer wurde nicht gefunden.");
      return;
    }

    await setDoc(doc(db, "customer_orders", orderNumber), {
      orderNumber,
      customerNumber,
      orderText: adminOrderText.value.trim(),
      status: adminOrderStatus.value,
      createdAt: serverTimestamp()
    });

    setMessage(`Auftrag wurde hinzugefügt. Auftragsnummer: ${orderNumber}`);
  } catch (error) {
    setMessage(error.message);
    return;
  }

  adminOrderForm.reset();
  await loadOrders();
});

adminEditOrderForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  const orderNumber = adminEditOrderNumber.value.trim().padStart(4, "0");
  const orderRef = doc(db, "customer_orders", orderNumber);

  try {
    const orderSnapshot = await getDoc(orderRef);

    if (!orderSnapshot.exists()) {
      setMessage("Diese Auftragsnummer wurde nicht gefunden.");
      return;
    }

    await updateDoc(orderRef, {
      status: adminEditOrderStatus.value,
      updatedAt: serverTimestamp()
    });
  } catch (error) {
    setMessage(error.message);
    return;
  }

  adminEditOrderForm.reset();
  await loadOrders();
  setMessage(`Auftrag ${orderNumber} wurde gespeichert.`);
});

adminCodeForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  if (adminCodeInput.value !== adminAccessCode) {
    setMessage("Admin-Code ist falsch.");
    return;
  }

  try {
    await setDoc(doc(db, "admin_users", activeUser.uid), {
      email: activeUser.email.toLowerCase(),
      promotedAt: serverTimestamp()
    });
  } catch (error) {
    setMessage(error.message);
    return;
  }

  adminCodeForm.reset();
  await checkAdmin();
  await loadOrders();
  setMessage("Admin-Zugriff wurde aktiviert.");
});

async function updatePortal(user) {
  activeUser = user || null;
  activeUserIsAdmin = false;
  authPanel.hidden = Boolean(activeUser);
  portalContent.hidden = !activeUser;
  adminPanel.hidden = true;
  adminCodePanel.hidden = true;
  passwordPanel.hidden = true;
  orderList.innerHTML = "";

  if (!activeUser) {
    return;
  }

  userStatus.textContent = `Eingeloggt als ${activeUser.email}`;
  await ensureCustomerProfile();
  userStatus.textContent = `Eingeloggt als ${activeUser.email} · Kundennummer ${activeUserCustomerNumber}`;
  await checkAdmin();
  await loadOrders();
}

onAuthStateChanged(auth, (user) => {
  updatePortal(user);
});
</script>

</body>
</html>
