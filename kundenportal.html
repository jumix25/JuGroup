<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kundenportal - JuGroup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <a class="brand" href="index.html">
    <img src="logo.png" alt="JuGroup Logo" class="logo-image">
    <span>JuGroup</span>
  </a>
</header>

<div class="section contact">
<h1>Kundenportal</h1>

<p>
Konto Beta ist jetzt mit Supabase Login verbunden.
</p>

<div class="portal-auth" id="auth-panel">
  <h2>Login</h2>

  <form class="portal-form" id="auth-form">
    <label>
      E-Mail
      <input id="auth-email" name="email" type="email" required>
    </label>

    <label>
      Passwort
      <input id="auth-password" name="password" type="password" minlength="6" required>
    </label>

    <div class="hero-actions">
      <button class="button primary" id="login-button" type="submit">Einloggen</button>
      <button class="button secondary" id="signup-button" type="button">Registrieren</button>
    </div>
  </form>

  <p id="auth-message"></p>
</div>

<div class="portal-content" id="portal-content" hidden>
<p id="user-status"></p>

<button class="button secondary" id="logout-button" type="button">Ausloggen</button>

<form class="portal-form" id="portal-form">
  <label>
    Name
    <input id="customer-name" name="name" type="text" required>
  </label>

  <label>
    E-Mail
    <input id="customer-email" name="email" type="email" required>
  </label>

  <label>
    Projekt
    <input id="customer-project" name="project" type="text" required>
  </label>

  <button class="button primary" type="submit">Speichern</button>
</form>

<div class="portal-database">
  <h2>Datenbank</h2>
  <div id="customer-list"></div>
  <button class="button secondary" id="clear-database" type="button">Daten löschen</button>
</div>
</div>

<a class="button primary"
   href="https://mail.google.com/mail/?view=cm&fs=1&to=jumix6544@gmail.com"
   target="_blank">
   Kontaktieren
</a>

<p><a href="index.html">Zurück zur Startseite</a></p>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabaseUrl = "https://jqorlsdbpcrkrpsnfkwx.supabase.co";
const supabaseKey = "sb_publishable_NHn5OYlZcFO4MdtN2nslNw_sMp5IVC3";
const supabase = createClient(supabaseUrl, supabaseKey);

const authPanel = document.getElementById("auth-panel");
const authForm = document.getElementById("auth-form");
const authEmail = document.getElementById("auth-email");
const authPassword = document.getElementById("auth-password");
const signupButton = document.getElementById("signup-button");
const authMessage = document.getElementById("auth-message");
const portalContent = document.getElementById("portal-content");
const userStatus = document.getElementById("user-status");
const logoutButton = document.getElementById("logout-button");
const form = document.getElementById("portal-form");
const list = document.getElementById("customer-list");
const clearButton = document.getElementById("clear-database");
let activeUser = null;

function getDatabaseKey() {
  return activeUser ? `jugroupCustomers:${activeUser.id}` : "jugroupCustomers";
}

function loadCustomers() {
  return JSON.parse(localStorage.getItem(getDatabaseKey()) || "[]");
}

function saveCustomers(customers) {
  localStorage.setItem(getDatabaseKey(), JSON.stringify(customers));
}

function setMessage(message) {
  authMessage.textContent = message;
}

function renderCustomers() {
  const customers = loadCustomers();
  list.innerHTML = "";

  if (customers.length === 0) {
    list.innerHTML = "<p>Noch keine Daten gespeichert.</p>";
    return;
  }

  customers.forEach((customer) => {
    const entry = document.createElement("div");
    const name = document.createElement("strong");
    const email = document.createElement("span");
    const project = document.createElement("span");

    entry.className = "portal-entry";
    name.textContent = customer.name;
    email.textContent = customer.email;
    project.textContent = customer.project;

    entry.append(name, email, project);
    list.append(entry);
  });
}

form.addEventListener("submit", (event) => {
  event.preventDefault();

  if (!activeUser) {
    setMessage("Bitte zuerst einloggen.");
    return;
  }

  const customers = loadCustomers();
  customers.push({
    name: document.getElementById("customer-name").value,
    email: document.getElementById("customer-email").value,
    project: document.getElementById("customer-project").value
  });

  saveCustomers(customers);
  form.reset();
  renderCustomers();
});

clearButton.addEventListener("click", () => {
  localStorage.removeItem(getDatabaseKey());
  renderCustomers();
});

authForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  setMessage("");

  const { error } = await supabase.auth.signInWithPassword({
    email: authEmail.value,
    password: authPassword.value
  });

  if (error) {
    setMessage(error.message);
  }
});

signupButton.addEventListener("click", async () => {
  if (!authForm.reportValidity()) {
    return;
  }

  setMessage("");

  const { error } = await supabase.auth.signUp({
    email: authEmail.value,
    password: authPassword.value,
    options: {
      emailRedirectTo: "https://jumix25.github.io/JuGroupSite/kundenportal.html"
    }
  });

  if (error) {
    setMessage(error.message);
    return;
  }

  setMessage("Registrierung erstellt. Bitte prüfe deine E-Mail.");
});

logoutButton.addEventListener("click", async () => {
  await supabase.auth.signOut();
});

function updatePortal(session) {
  activeUser = session?.user || null;
  authPanel.hidden = Boolean(activeUser);
  portalContent.hidden = !activeUser;

  if (!activeUser) {
    list.innerHTML = "";
    return;
  }

  userStatus.textContent = `Eingeloggt als ${activeUser.email}`;
  renderCustomers();
}

const { data } = await supabase.auth.getSession();
updatePortal(data.session);

supabase.auth.onAuthStateChange((_event, session) => {
  updatePortal(session);
});
</script>

</body>
</html>
